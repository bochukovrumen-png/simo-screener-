<!DOCTYPE html>
<html>
<head>
<title>Bochu AI Trading</title>

<style>
body{margin:0;font-family:Arial;background:#0b0f19;color:white}
.top{display:flex;gap:10px;padding:10px;background:#020617}

input{padding:6px;background:#1e293b;color:white;border:none}

.app{display:grid;grid-template-columns:260px 1fr 360px;height:95vh}

.sidebar{background:#0f172a;padding:10px}
.coin{background:#1e293b;margin:5px 0;padding:8px;border-radius:6px}

.main{padding:15px}
.right{background:#0f172a;padding:10px}

.green{color:#22c55e}
.red{color:#ef4444}
.yellow{color:#facc15}

button{margin:5px;padding:6px;border:none;border-radius:6px;background:#334155;color:white;cursor:pointer}
.active{background:#22c55e;color:black}
</style>
</head>

<body>

<div class="top">
<input placeholder="Search..." oninput="search(this.value)">
<div id="results"></div>
</div>

<div class="app">

<!-- LEFT -->
<div class="sidebar">
<h3>Watchlist</h3>
<div id="watch"></div>
</div>

<!-- CENTER -->
<div class="main">

<h3 id="asset">Select asset</h3>

<iframe id="chart" width="100%" height="420"
src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:BTCUSDT&theme=dark"></iframe>

<div id="analysis"></div>

<div>
<button onclick="setSide('LONG')" id="longBtn">LONG</button>
<button onclick="setSide('SHORT')" id="shortBtn">SHORT</button>
</div>

SL % <input id="sl" value="3">

<button onclick="startTrade()">🚀 Start Trade</button>

</div>

<!-- RIGHT -->
<div class="right">
<h3>Active Trade</h3>
<div id="tradeBox"></div>
</div>

</div>

<script>

let watch=JSON.parse(localStorage.getItem("watch"))||[]
let trade=null
let side="LONG"
let current=null

function saveLS(){
localStorage.setItem("watch",JSON.stringify(watch))
}

// SEARCH
async function search(q){
if(q.length<2)return

let res=await fetch(`https://api.coingecko.com/api/v3/search?query=${q}`)
let data=await res.json()

document.getElementById("results").innerHTML=
data.coins.slice(0,8).map(c=>`
<div onclick="select('${c.id}','${c.symbol.toUpperCase()}')">
${c.symbol.toUpperCase()} - ${c.name}
</div>
`).join("")
}

// SELECT
async function select(id,symbol){

if(!watch.find(x=>x.id===id)){
watch.push({id,symbol,price:0})
saveLS()
renderWatch()
}

document.getElementById("asset").innerText=symbol

document.getElementById("chart").src=
`https://s.tradingview.com/widgetembed/?symbol=BINANCE:${symbol}USDT&theme=dark`

current={id,symbol}

runAI()
}

// WATCHLIST
async function updatePrices(){

if(watch.length===0)return

let ids=watch.map(x=>x.id).join(",")

let res=await fetch(
`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd`
)

let data=await res.json()

watch.forEach(w=>{
if(data[w.id])w.price=data[w.id].usd
})

renderWatch()
updateTrade()
}

function renderWatch(){
document.getElementById("watch").innerHTML=
watch.map((w,i)=>`
<div class="coin">
<b onclick="select('${w.id}','${w.symbol}')">${w.symbol}</b><br/>
$${w.price}
<button onclick="remove(${i})">🗑</button>
</div>
`).join("")
}

function remove(i){
watch.splice(i,1)
saveLS()
renderWatch()
}

// SIDE
function setSide(s){
side=s
document.getElementById("longBtn").classList.toggle("active",s==="LONG")
document.getElementById("shortBtn").classList.toggle("active",s==="SHORT")
}

// START TRADE
function startTrade(){

let entry=watch.find(w=>w.id===current.id).price
let slp=document.getElementById("sl").value

let sl=side==="LONG"
?entry*(1-slp/100)
:entry*(1+slp/100)

trade={...current,entry,sl,side}

updateTrade()
}

// R CALC
function calcR(t,price){
let risk=Math.abs(t.entry-t.sl)
let reward=t.side==="LONG"?price-t.entry:t.entry-price
return reward/risk
}

// UPDATE TRADE PANEL
function updateTrade(){

if(!trade)return

let price=watch.find(w=>w.id===trade.id).price

let r=calcR(trade,price)

let status="OPEN"
if(trade.side==="LONG"&&price<trade.sl)status="LOSS"
if(trade.side==="SHORT"&&price>trade.sl)status="LOSS"

document.getElementById("tradeBox").innerHTML=`
<b>${trade.symbol} (${trade.side})</b><br/>
Price: ${price}<br/>
SL: ${trade.sl.toFixed(2)}<br/>

R: <span class="${r>0?'green':'red'}">${r.toFixed(2)}</span><br/>

<span class="${status==='LOSS'?'red':'green'}">${status}</span>
`
}

// AI ANALYSIS
function runAI(){

// fake EMA logic (placeholder but structured)
let trend=Math.random()

let text=""
if(trend>0.7){
text="🟢 TOP SETUP (EMA aligned + strength)"
}
else if(trend>0.4){
text="🟡 WATCH (consolidation forming)"
}
else{
text="🔴 NO TRADE (no trend)"
}

document.getElementById("analysis").innerHTML=text
}

// LOOP
setInterval(updatePrices,4000)
updatePrices()

</script>

</body>
</html>
