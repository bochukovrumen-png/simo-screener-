<!DOCTYPE html>
<html>
<head>
<title>Bochu Trading PRO</title>

<style>
body{margin:0;font-family:Arial;background:#0b0f19;color:white}
.top{display:flex;gap:10px;padding:10px;background:#020617}
.btn{padding:6px 12px;background:#1e293b;border-radius:6px;cursor:pointer}
.active{background:#22c55e;color:black}

.searchBox{position:relative}
#results{
position:absolute;
top:35px;
background:#1e293b;
width:200px;
max-height:200px;
overflow:auto;
border-radius:6px;
}

.item{padding:5px;cursor:pointer}
.item:hover{background:#334155}

.app{display:grid;grid-template-columns:260px 1fr 360px;height:95vh}

.sidebar{background:#0f172a;padding:10px}
.coin{background:#1e293b;margin:5px 0;padding:8px;border-radius:6px}

.main{padding:15px}
.right{background:#0f172a;padding:10px}

.trade{background:#111827;margin:5px 0;padding:10px;border-radius:8px}

.green{color:#22c55e}
.red{color:#ef4444}
</style>
</head>

<body>

<div class="top">

<div class="btn active" onclick="setUser('Rumen')">Rumen</div>
<div class="btn" onclick="setUser('Goro')">Goro</div>

<div class="searchBox">
<input placeholder="Search asset..." oninput="search(this.value)">
<div id="results"></div>
</div>

</div>

<div class="app">

<!-- LEFT -->
<div class="sidebar">
<h3>Watchlist</h3>
<div id="watch"></div>
</div>

<!-- CENTER -->
<div class="main">

<h3 id="selected">Select asset</h3>

<iframe id="chart" width="100%" height="420"
src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:BTCUSDT&theme=dark"></iframe>

<div>
SL % <input id="sl" value="3">
<button onclick="flip()">Flip (<span id="sideView">LONG</span>)</button>
<button onclick="save()">Save</button>
</div>

</div>

<!-- RIGHT -->
<div class="right">
<h3>Trades</h3>
<div id="trades"></div>
</div>

</div>

<script>

let user="Rumen"
let side="LONG"
let temp=null

let store=JSON.parse(localStorage.getItem("store"))||{Rumen:[],Goro:[]}
let watch=JSON.parse(localStorage.getItem("watch"))||[]

function saveStorage(){
localStorage.setItem("store",JSON.stringify(store))
localStorage.setItem("watch",JSON.stringify(watch))
}

function setUser(u){
user=u
renderTrades()
}

async function search(q){

if(q.length<2){
document.getElementById("results").innerHTML=""
return
}

let res=await fetch(`https://api.coingecko.com/api/v3/search?query=${q}`)
let data=await res.json()

document.getElementById("results").innerHTML=
data.coins.slice(0,10).map(c=>`
<div class="item" onclick="add('${c.id}','${c.symbol.toUpperCase()}')">
${c.symbol.toUpperCase()} - ${c.name}
</div>
`).join("")
}

function add(id,symbol){

if(!watch.find(x=>x.id===id)){
watch.push({id,symbol,price:0})
saveStorage()
renderWatch()
}

document.getElementById("results").innerHTML=""
}

function remove(i){
watch.splice(i,1)
saveStorage()
renderWatch()
}

async function updatePrices(){

if(watch.length===0) return

let ids=watch.map(x=>x.id).join(",")

let res=await fetch(
`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd`
)

let data=await res.json()

watch.forEach(w=>{
if(data[w.id]){
w.price=data[w.id].usd
}
})

renderWatch()
renderTrades()
}

function renderWatch(){

document.getElementById("watch").innerHTML=
watch.map((w,i)=>`
<div class="coin">
<b onclick="select('${w.id}','${w.symbol}',${w.price})">${w.symbol}</b><br/>
$${w.price}
<button onclick="remove(${i})">🗑</button>
</div>
`).join("")
}

function select(id,symbol,price){

document.getElementById("selected").innerText=symbol

document.getElementById("chart").src=
`https://s.tradingview.com/widgetembed/?symbol=BINANCE:${symbol}USDT&theme=dark`

temp={id,symbol,entry:price,side}
}

function flip(){
side=side==="LONG"?"SHORT":"LONG"
document.getElementById("sideView").innerText=side
}

function save(){

let slp=document.getElementById("sl").value

let sl=side==="LONG"
?temp.entry*(1-slp/100)
:temp.entry*(1+slp/100)

store[user].push({...temp,sl})
saveStorage()
renderTrades()
}

function calcR(t,price){

let risk=Math.abs(t.entry-t.sl)
let reward=t.side==="LONG"?price-t.entry:t.entry-price

return reward/risk
}

function renderTrades(){

document.getElementById("trades").innerHTML=
store[user].map((t,i)=>{

let live=watch.find(w=>w.id===t.id)
let price=live?live.price:t.entry

let r=calcR(t,price)

let status="OPEN"
if(t.side==="LONG"&&price<t.sl)status="LOSS"
if(t.side==="SHORT"&&price>t.sl)status="LOSS"

return `
<div class="trade">
<b>${t.symbol} (${t.side})</b><br/>
Entry ${t.entry}<br/>
SL ${t.sl.toFixed(2)}<br/>

R <span class="${r>0?'green':'red'}">${r.toFixed(2)}</span><br/>

${status==="LOSS"?"<span class='red'>LOSS</span>":"<span class='green'>OPEN</span>"}

<button onclick="del(${i})">🗑</button>
</div>`
}).join("")
}

function del(i){
store[user].splice(i,1)
saveStorage()
renderTrades()
}

setInterval(updatePrices,5000)
updatePrices()

</script>

</body>
</html>
