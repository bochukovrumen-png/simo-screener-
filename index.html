<!DOCTYPE html>
<html>
<head>
  <title>Simo Screener PRO</title>
</head>

<body>

<h1>Simo Screener PRO (Top 100)</h1>

<button onclick="setFilter('ALL')">ALL</button>
<button onclick="setFilter('BUY')">BUY</button>
<button onclick="setFilter('SELL')">SELL</button>

<p>PNL: <span id="pnl">0</span>%</p>

<table border="1" cellpadding="6">
  <thead>
    <tr>
      <th>Coin</th>
      <th>Price</th>
      <th>Signal</th>
    </tr>
  </thead>
  <tbody id="table"></tbody>
</table>

<script>
let history = {};
let filter = "ALL";
let trades = [];

function setFilter(f) {
  filter = f;
}

function calculateEMA(prices, period) {
  const k = 2 / (period + 1);
  let ema = prices[0];

  for (let i = 1; i < prices.length; i++) {
    ema = prices[i] * k + ema * (1 - k);
  }

  return ema;
}

function getSignal(symbol, price) {
  if (!history[symbol]) history[symbol] = [];

  history[symbol].push(price);

  if (history[symbol].length > 30) {
    history[symbol].shift();
  }

  if (history[symbol].length < 21) return "WAIT";

  const ema9 = calculateEMA(history[symbol].slice(-9), 9);
  const ema21 = calculateEMA(history[symbol].slice(-21), 21);

  if (ema9 > ema21) return "BUY";
  if (ema9 < ema21) return "SELL";
  return "WAIT";
}

function updatePNL() {
  let pnl = 0;

  trades.forEach(t => {
    if (t.exit) {
      pnl += ((t.exit - t.entry) / t.entry) * 100;
    }
  });

  document.getElementById('pnl').innerText = pnl.toFixed(2);
}

function handleTrade(symbol, signal, price) {
  let last = trades.find(t => t.symbol === symbol && !t.exit);

  if (signal === "BUY" && !last) {
    trades.push({ symbol, entry: price });
  }

  if (signal === "SELL" && last) {
    last.exit = price;
  }
}

async function refreshData() {
  const res = await fetch('/api/refresh');
  const data = await res.json();

  const table = document.getElementById('table');

  table.innerHTML = data.coins.map(c => {
    const signal = getSignal(c.symbol, c.price);

    handleTrade(c.symbol, signal, c.price);

    if (filter !== "ALL" && signal !== filter) return "";

    let color = "white";
    if (signal === "BUY") color = "#c8f7c5";
    if (signal === "SELL") color = "#f7c5c5";

    return `
      <tr style="background:${color}">
        <td>${c.symbol}</td>
        <td>${c.price.toFixed(2)}</td>
        <td><b>${signal}</b></td>
      </tr>
    `;
  }).join('');

  updatePNL();
}

setInterval(refreshData, 5000);
</script>

</body>
</html>
