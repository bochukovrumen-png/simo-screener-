<!DOCTYPE html>
<html>
<head>
<title>Bochu Trading Stable</title>

<style>
body{margin:0;font-family:Arial;background:#0b0f19;color:white}

.top{padding:10px;background:#020617}

.searchBox{position:relative}
#results{
position:absolute;
background:#1e293b;
width:220px;
max-height:200px;
overflow:auto;
border-radius:6px;
}

.item{padding:6px;cursor:pointer}
.item:hover{background:#334155}

button{cursor:pointer;margin:5px;padding:6px;border:none;border-radius:6px;background:#334155;color:white}
.active{background:#22c55e;color:black}

.app{display:grid;grid-template-columns:260px 1fr 320px;height:95vh}

.sidebar{background:#0f172a;padding:10px;overflow:auto}
.coin{background:#1e293b;margin:5px 0;padding:8px;border-radius:6px;cursor:pointer}

.main{padding:15px}
.right{background:#0f172a;padding:10px;overflow:auto}

.trade{background:#111827;margin:5px 0;padding:10px;border-radius:8px}

.green{color:#22c55e}
.red{color:#ef4444}
</style>
</head>

<body>

<div class="top">
<div class="searchBox">
<input id="searchInput" placeholder="Search..." oninput="search()">
<div id="results"></div>
</div>
</div>

<div class="app">

<div class="sidebar">
<h3>Watchlist</h3>
<div id="watch"></div>
</div>

<div class="main">

<h3 id="asset">Select asset</h3>

<iframe id="chart" width="100%" height="420"
src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:BTCUSDT&theme=dark"></iframe>

<div id="analysis"></div>

<div>
<button id="longBtn" onclick="setSide('LONG')">LONG</button>
<button id="shortBtn" onclick="setSide('SHORT')">SHORT</button>
</div>

SL % <input id="sl" value="3">

<button onclick="startTrade()">🚀 Start Trade</button>

</div>

<div class="right">
<h3>Trades</h3>
<div id="trades"></div>
</div>

</div>

<script>

let trades = JSON.parse(localStorage.getItem("trades")) || []
let watchlist = JSON.parse(localStorage.getItem("watch")) || []

let current = null
let side = "LONG"

// SAVE
function save(){
localStorage.setItem("trades", JSON.stringify(trades))
localStorage.setItem("watch", JSON.stringify(watchlist))
}

// EMA
function ema(arr,p){
let k=2/(p+1),v=arr[0]
for(let i=1;i<arr.length;i++){
v = arr[i]*k + v*(1-k)
}
return v
}

// VCP
function isVCP(prices){
let ranges=[]
for(let i=1;i<prices.length;i++){
ranges.push(Math.abs(prices[i]-prices[i-1]))
}
return ranges.slice(-5).every((v,i,a)=> i===0 || v<=a[i-1])
}

// SEARCH
async function search(){
let q = document.getElementById("searchInput").value

if(q.length < 2){
results.innerHTML=""
return
}

let res = await fetch(`https://api.coingecko.com/api/v3/search?query=${q}`)
let data = await res.json()

results.innerHTML = data.coins.slice(0,6).map(c=>`
<div class="item" onclick="select('${c.id}','${c.symbol.toUpperCase()}')">
${c.symbol.toUpperCase()} - ${c.name}
</div>
`).join("")
}

// SELECT
function select(id,symbol){

results.innerHTML=""

if(!watchlist.find(x=>x.id===id)){
watchlist.push({id,symbol,price:0})
save()
}

current = {id,symbol}

document.getElementById("asset").innerText = symbol

document.getElementById("chart").src =
`https://s.tradingview.com/widgetembed/?symbol=BINANCE:${symbol}USDT&theme=dark`

runAI(id)
}

// SIDE
function setSide(s){
side = s
longBtn.classList.toggle("active", s==="LONG")
shortBtn.classList.toggle("active", s==="SHORT")
}

// START TRADE (FIXED)
function startTrade(){

if(!current){
alert("Select asset")
return
}

let w = watchlist.find(x=>x.id===current.id)

if(!w || !w.price){
alert("Price loading...")
return
}

let entry = w.price
let slp = Number(document.getElementById("sl").value)

let sl = side==="LONG"
? entry*(1-slp/100)
: entry*(1+slp/100)

trades.unshift({
id:Date.now(),
symbol:current.symbol,
side,
entry,
sl
})

save()
renderTrades()
}

// UPDATE PRICES
async function updatePrices(){

if(watchlist.length===0) return

let ids = watchlist.map(x=>x.id).join(",")

let res = await fetch(
`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd`
)

let data = await res.json()

watchlist.forEach(w=>{
if(data[w.id]) w.price = data[w.id].usd
})

renderWatch()
renderTrades()
}

// WATCHLIST
function renderWatch(){
watch.innerHTML = watchlist.map((w,i)=>`
<div class="coin">
<b onclick="select('${w.id}','${w.symbol}')">${w.symbol}</b><br/>
$${w.price || "-"}
<button onclick="removeWatch(${i})">🗑</button>
</div>
`).join("")
}

function removeWatch(i){
watchlist.splice(i,1)
save()
renderWatch()
}

// R CALC
function calcR(t,price){
let risk = Math.abs(t.entry - t.sl)
let reward = t.side==="LONG" ? price-t.entry : t.entry-price
return reward / risk
}

// TRADES
function renderTrades(){
trades.innerHTML = trades.map((t,i)=>{

let w = watchlist.find(x=>x.symbol===t.symbol)
let price = w ? w.price : t.entry

let r = calcR(t,price)

let status = "OPEN"
if(t.side==="LONG" && price < t.sl) status="LOSS"
if(t.side==="SHORT" && price > t.sl) status="LOSS"

return `
<div class="trade">
<b>${t.symbol} (${t.side})</b><br/>
Entry ${t.entry}<br/>
SL ${t.sl.toFixed(2)}<br/>
R <span class="${r>0?'green':'red'}">${r.toFixed(2)}</span><br/>
<span class="${status==='LOSS'?'red':'green'}">${status}</span><br/>
<button onclick="delTrade(${i})">🗑</button>
</div>
`
}).join("")
}

function delTrade(i){
trades.splice(i,1)
save()
renderTrades()
}

// AI
async function runAI(id){

let res = await fetch(
`https://api.coingecko.com/api/v3/coins/${id}/market_chart?vs_currency=usd&days=30`
)

let data = await res.json()
let prices = data.prices.map(p=>p[1])

if(prices.length < 50){
analysis.innerHTML="Not enough data"
return
}

let e9 = ema(prices.slice(-9),9)
let e20 = ema(prices.slice(-20),20)
let e50 = ema(prices.slice(-50),50)

let trend = e9>e20 && e20>e50
let vcp = isVCP(prices)

analysis.innerHTML = `
Trend: ${trend ? "OK" : "NO"}<br/>
VCP: ${vcp ? "YES" : "NO"}
`
}

// LOOP
setInterval(updatePrices,4000)
updatePrices()

</script>

</body>
</html>
