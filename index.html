<!DOCTYPE html>
<html>
<head>
  <title>Trading AI PRO</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0f19;
      color: white;
    }

    .topbar {
      display: flex;
      gap: 10px;
      padding: 10px;
      background: #020617;
    }

    .user {
      padding: 8px 15px;
      background: #1e293b;
      border-radius: 8px;
      cursor: pointer;
    }

    .active {
      background: #22c55e;
      color: black;
    }

    .app {
      display: grid;
      grid-template-columns: 260px 1fr 360px;
      height: 95vh;
    }

    .sidebar {
      background: #0f172a;
      padding: 10px;
      overflow-y: auto;
    }

    .coin {
      padding: 10px;
      margin: 5px 0;
      background: #1e293b;
      border-radius: 8px;
      cursor: pointer;
    }

    .main {
      padding: 15px;
    }

    .right {
      background: #0f172a;
      padding: 10px;
      overflow-y: auto;
    }

    .box {
      background: #111827;
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .trade {
      background: #111827;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 10px;
    }

    button {
      margin-top: 5px;
      padding: 6px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #334155;
      color: white;
    }

    .long { color: #22c55e; }
    .short { color: #ef4444; }

    canvas {
      width: 100%;
      height: 120px;
      background: #0f172a;
    }

    @media(max-width:900px){
      .app{grid-template-columns:1fr;}
    }
  </style>
</head>

<body>

<div class="topbar">
  <div class="user active" onclick="switchUser('Rumen')">Rumen</div>
  <div class="user" onclick="switchUser('Goro')">Goro</div>
</div>

<div class="app">

  <!-- LEFT -->
  <div class="sidebar">
    <h3>Assets</h3>
    <div id="list"></div>
  </div>

  <!-- CENTER -->
  <div class="main">

    <h2 id="title">Rumen</h2>
    <h3 id="selected">Select asset</h3>

    <iframe id="chart"
      width="100%"
      height="420"
      frameborder="0"
      src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:BTCUSDT&theme=dark&interval=5">
    </iframe>

    <div class="box">
      <h3>Current Trade</h3>
      <div id="temp"></div>
      <button onclick="flip()">🔄 Flip LONG/SHORT</button>
      <button onclick="saveTrade()">💾 Save</button>
    </div>

  </div>

  <!-- RIGHT -->
  <div class="right">

    <div class="box">
      <h3>AI Signal</h3>
      <div id="ai"></div>
    </div>

    <div class="box">
      <h3>Equity</h3>
      <canvas id="equity"></canvas>
    </div>

    <h3>Trades</h3>
    <div id="trades"></div>

  </div>

</div>

<script>

let user = "Rumen";

let store = {
  Rumen: [],
  Goro: []
};

let assets = [];
let temp = null;
let side = "LONG";

let equity = {
  Rumen: [100],
  Goro: [100]
};

function switchUser(u){
  user = u;
  document.querySelectorAll(".user").forEach(x=>x.classList.remove("active"));
  event.target.classList.add("active");
  document.getElementById("title").innerText = u;
  renderTrades();
}

function ema(arr,p){
  const k=2/(p+1);
  let v=arr[0];
  for(let i=1;i<arr.length;i++){
    v=arr[i]*k+v*(1-k);
  }
  return v;
}

function ai(prices){

  const e9=ema(prices,9);
  const e20=ema(prices,20);
  const e50=ema(prices,50);
  const e200=ema(prices,50);

  const cons = (Math.max(...prices)-Math.min(...prices))<prices[0]*0.03;

  if(e9>e20&&e20>e50&&e50>e200&&cons)
    return {t:"GOOD LONG",c:"long"};

  if(e200>e50&&e50>e20&&e20>e9&&cons)
    return {t:"GOOD SHORT",c:"short"};

  return {t:"NO SETUP",c:""};
}

function select(s,p){

  document.getElementById("selected").innerText=s;

  document.getElementById("chart").src=
  `https://s.tradingview.com/widgetembed/?symbol=BINANCE:${s}USDT&theme=dark&interval=5`;

  let prices=Array.from({length:60},()=>p*(1+(Math.random()-0.5)*0.05));

  let a=ai(prices);

  temp={
    symbol:s,
    entry:p,
    sl:side==="LONG"?p*0.97:p*1.03,
    side
  };

  document.getElementById("ai").innerHTML=
  `<b class="${a.c}">${a.t}</b>`;

  document.getElementById("temp").innerHTML=
  `${s}<br/>${p}<br/>${side}`;
}

function flip(){
  side=side==="LONG"?"SHORT":"LONG";
  if(temp){
    temp.side=side;
    temp.sl=side==="LONG"?temp.entry*0.97:temp.entry*1.03;
  }
}

function saveTrade(){

  if(store[user].length>=50){
    alert("Max 50 trades");
    return;
  }

  store[user].push({...temp,id:Date.now()});
  renderTrades();
}

function del(id){
  store[user]=store[user].filter(t=>t.id!==id);
  renderTrades();
}

function renderTrades(){

  document.getElementById("trades").innerHTML=
  store[user].map(t=>`

    <div class="trade">
      <b class="${t.side==="LONG"?"long":"short"}">${t.symbol} ${t.side}</b><br/>
      Entry: ${t.entry}<br/>
      SL: ${t.sl}<br/>
      <button onclick="del(${t.id})">🗑</button>
    </div>

  `).join("");
}

function equityDraw(){

  let arr=equity[user];

  let c=document.getElementById("equity");
  let ctx=c.getContext("2d");

  ctx.clearRect(0,0,400,120);
  ctx.beginPath();

  ctx.moveTo(0,100);

  arr.forEach((v,i)=>{
    ctx.lineTo(i*8,120-v);
  });

  ctx.strokeStyle="#22c55e";
  ctx.stroke();
}

async function load(){

  let r=await fetch("/api/refresh");
  let d=await r.json();

  assets=d.coins;

  document.getElementById("list").innerHTML=
  assets.map(a=>`
    <div class="coin" onclick="select('${a.symbol}',${a.price})">
      ${a.symbol}
    </div>
  `).join("");

  let total=100;

  store[user].forEach(()=>total+=Math.random()-0.5);

  equity[user].push(total);
  if(equity[user].length>40) equity[user].shift();

  equityDraw();
  renderTrades();
}

setInterval(load,4000);
load();

</script>

</body>
</html>
