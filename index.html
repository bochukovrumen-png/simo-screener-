<!DOCTYPE html>
<html>
<head>
  <title>Simo Trading PRO</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0f19;
      color: white;
    }

    .app {
      display: grid;
      grid-template-columns: 260px 1fr 360px;
      height: 100vh;
    }

    /* LEFT */
    .sidebar {
      background: #0f172a;
      padding: 10px;
      overflow-y: auto;
    }

    .coin {
      padding: 10px;
      margin: 5px 0;
      background: #1e293b;
      border-radius: 8px;
      cursor: pointer;
    }

    .coin:hover {
      background: #334155;
    }

    /* CENTER */
    .main {
      padding: 15px;
    }

    .chart {
      height: 520px;
      border-radius: 12px;
      overflow: hidden;
    }

    /* RIGHT */
    .right {
      background: #0f172a;
      padding: 10px;
      overflow-y: auto;
    }

    .box {
      background: #111827;
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .trade {
      background: #111827;
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .green { color: #22c55e; font-weight: bold; }
    .red { color: #ef4444; font-weight: bold; }

    button {
      margin-top: 5px;
      padding: 5px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #334155;
      color: white;
    }

    .header {
      padding: 10px;
      background: #020617;
    }
  </style>
</head>

<body>

<div class="header">
  <b>Simo Trading PRO</b>
</div>

<div class="app">

  <!-- LEFT -->
  <div class="sidebar">
    <h3>Watchlist</h3>
    <div id="list"></div>
  </div>

  <!-- CENTER -->
  <div class="main">
    <h3 id="selected">Select Coin</h3>

    <div class="chart">
      <iframe id="chart"
        width="100%"
        height="520"
        frameborder="0"
        src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:BTCUSDT&theme=dark&interval=5">
      </iframe>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right">

    <div class="box">
      <h3>Stats</h3>
      <div>Trades loaded from memory</div>
    </div>

    <h3>Trades</h3>
    <div id="tradeBox"></div>

  </div>

</div>

<script>

let coins = [];
let trades = JSON.parse(localStorage.getItem("trades") || "{}");

function save() {
  localStorage.setItem("trades", JSON.stringify(trades));
}

function calculatePnL(trade, price) {
  const risk = trade.entry - trade.sl;
  const reward = price - trade.entry;
  return reward / risk;
}

function selectCoin(symbol, price) {

  document.getElementById("selected").innerText = symbol;

  document.getElementById("chart").src =
    `https://s.tradingview.com/widgetembed/?symbol=BINANCE:${symbol}USDT&theme=dark&interval=5`;

  if (!trades[symbol]) trades[symbol] = [];

  if (trades[symbol].length < 3) {
    trades[symbol].push({
      id: Date.now(),
      entry: price,
      sl: price * 0.97,
      status: "OPEN"
    });
  }

  save();
  renderTrades();
}

function deleteTrade(symbol, id) {
  trades[symbol] = trades[symbol].filter(t => t.id !== id);
  save();
  renderTrades();
}

function renderTrades() {
  const box = document.getElementById("tradeBox");
  let html = "";

  for (let symbol in trades) {

    trades[symbol].forEach(t => {

      const coin = coins.find(c => c.symbol === symbol);
      const price = coin ? coin.price : t.entry;

      const pnl = calculatePnL(t, price);

      let color = "#fff";

      if (price <= t.sl) {
        t.status = "LOSS";
        color = "#ef4444";
      } else if (pnl > 0) {
        t.status = "PROFIT";
        color = "#22c55e";
      } else {
        t.status = "#fff";
      }

      html += `
        <div class="trade">
          <b>${symbol}</b><br/>
          Entry: ${t.entry.toFixed(2)}<br/>
          SL: ${t.sl.toFixed(2)}<br/>
          PnL (R): <span style="color:${color}">${pnl.toFixed(2)}</span><br/>
          Status: <span style="color:${color}">${t.status}</span><br/>
          <button onclick="deleteTrade('${symbol}', ${t.id})">🗑 Delete</button>
        </div>
      `;
    });
  }

  box.innerHTML = html;
}

function render() {
  const list = document.getElementById("list");

  list.innerHTML = coins.map(c => `
    <div class="coin" onclick="selectCoin('${c.symbol}', ${c.price})">
      <b>${c.symbol}</b><br/>
      $${c.price.toFixed(2)}
    </div>
  `).join('');
}

async function load() {
  const res = await fetch("/api/refresh");
  const data = await res.json();

  coins = data.coins;

  render();
  renderTrades();
}

setInterval(load, 5000);
load();

</script>

</body>
</html>
