<!DOCTYPE html>
<html>
<head>
<title>Bochu AI Trading PRO</title>

<style>
body{margin:0;font-family:Arial;background:#0b0f19;color:white}

.top{display:flex;gap:10px;padding:10px;background:#020617}

input{padding:6px;background:#1e293b;color:white;border:none}

.searchBox{position:relative}
#results{
position:absolute;
top:35px;
background:#1e293b;
width:220px;
max-height:200px;
overflow:auto;
border-radius:6px;
}

.item{padding:6px;cursor:pointer}
.item:hover{background:#334155}

button{cursor:pointer}

.app{display:grid;grid-template-columns:260px 1fr 360px;height:95vh}

.sidebar{background:#0f172a;padding:10px}
.coin{background:#1e293b;margin:5px 0;padding:8px;border-radius:6px;cursor:pointer}

.main{padding:15px}
.right{background:#0f172a;padding:10px}

.trade{background:#111827;margin:5px 0;padding:10px;border-radius:8px}

.green{color:#22c55e}
.red{color:#ef4444}
.yellow{color:#facc15}
</style>
</head>

<body>

<div class="top">

<div class="searchBox">
<input placeholder="Search..." oninput="search(this.value)">
<div id="results"></div>
</div>

</div>

<div class="app">

<!-- LEFT -->
<div class="sidebar">
<h3>Watchlist</h3>
<div id="watch"></div>
</div>

<!-- CENTER -->
<div class="main">

<h3 id="asset">Select asset</h3>

<iframe id="chart" width="100%" height="420"
src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:BTCUSDT&theme=dark"></iframe>

<div id="analysis"></div>

<div>
<button onclick="setSide('LONG')" id="longBtn">LONG</button>
<button onclick="setSide('SHORT')" id="shortBtn">SHORT</button>
</div>

SL % <input id="sl" value="3">

<button onclick="startTrade()">🚀 Start Trade</button>

</div>

<!-- RIGHT -->
<div class="right">
<h3>Trades</h3>
<div id="trades"></div>
</div>

</div>

<script>

// STORAGE
let trades=JSON.parse(localStorage.getItem("trades"))||[]
let watch=JSON.parse(localStorage.getItem("watch"))||[]

let side="LONG"
let current=null

function saveLS(){
localStorage.setItem("trades",JSON.stringify(trades))
localStorage.setItem("watch",JSON.stringify(watch))
}

// EMA
function ema(arr, p){
let k=2/(p+1)
let v=arr[0]
for(let i=1;i<arr.length;i++){
v=arr[i]*k+v*(1-k)
}
return v
}

// VCP detection
function detectVCP(prices){
let ranges=[]
for(let i=1;i<prices.length;i++){
ranges.push(Math.abs(prices[i]-prices[i-1]))
}
let shrinking=true
for(let i=1;i<ranges.length;i++){
if(ranges[i]>ranges[i-1]) shrinking=false
}
return shrinking
}

// AI ENGINE
async function runAI(id){

let res=await fetch(`https://api.coingecko.com/api/v3/coins/${id}/market_chart?vs_currency=usd&days=30`)
let data=await res.json()

let prices=data.prices.map(p=>p[1])

let e9=ema(prices.slice(-9),9)
let e20=ema(prices.slice(-20),20)
let e50=ema(prices.slice(-50),50)
let e200=ema(prices.slice(-50),50) // fallback

let trendLong = e9>e20 && e20>e50
let trendShort = e9<e20 && e20<e50

let vcp=detectVCP(prices.slice(-10))

// RS vs BTC
let btc=await fetch(`https://api.coingecko.com/api/v3/coins/bitcoin/market_chart?vs_currency=usd&days=30`)
let btcData=await btc.json()
let btcPrices=btcData.prices.map(p=>p[1])

let rs = (prices[prices.length-1]/prices[0]) > (btcPrices[btcPrices.length-1]/btcPrices[0])

let score=0

if(trendLong||trendShort) score+=40
if(vcp) score+=30
if(rs) score+=30

let text=""

if(score>70) text="🟢 TOP SETUP"
else if(score>40) text="🟡 WATCH"
else text="🔴 NO TRADE"

document.getElementById("analysis").innerHTML=
`${text}<br/>Score: ${score}/100`
}

// SEARCH
async function search(q){

if(q.length<2){
document.getElementById("results").innerHTML=""
return
}

let res=await fetch(`https://api.coingecko.com/api/v3/search?query=${q}`)
let data=await res.json()

document.getElementById("results").innerHTML=
data.coins.slice(0,8).map(c=>`
<div class="item" onclick="select('${c.id}','${c.symbol.toUpperCase()}')">
${c.symbol.toUpperCase()} - ${c.name}
</div>
`).join("")
}

// SELECT
function select(id,symbol){

if(!watch.find(x=>x.id===id)){
watch.push({id,symbol,price:0})
saveLS()
renderWatch()
}

current={id,symbol}

document.getElementById("asset").innerText=symbol

document.getElementById("chart").src=
`https://s.tradingview.com/widgetembed/?symbol=BINANCE:${symbol}USDT&theme=dark`

runAI(id)
}

// WATCH
async function updatePrices(){

if(watch.length===0)return

let ids=watch.map(x=>x.id).join(",")

let res=await fetch(
`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd`
)

let data=await res.json()

watch.forEach(w=>{
if(data[w.id]) w.price=data[w.id].usd
})

renderWatch()
renderTrades()
}

function renderWatch(){
document.getElementById("watch").innerHTML=
watch.map((w,i)=>`
<div class="coin">
<b onclick="select('${w.id}','${w.symbol}')">${w.symbol}</b>
<br/>$${w.price}
<button onclick="remove(${i})">🗑</button>
</div>
`).join("")
}

function remove(i){
watch.splice(i,1)
saveLS()
renderWatch()
}

// TRADE
function setSide(s){side=s}

function startTrade(){

let entry=watch.find(w=>w.id===current.id).price
let slp=document.getElementById("sl").value

let sl=side==="LONG"
?entry*(1-slp/100)
:entry*(1+slp/100)

trades.push({...current,entry,sl,side,id:Date.now()})
saveLS()
renderTrades()
}

function calcR(t,price){
let risk=Math.abs(t.entry-t.sl)
let reward=t.side==="LONG"?price-t.entry:t.entry-price
return reward/risk
}

function renderTrades(){

document.getElementById("trades").innerHTML=
trades.map((t,i)=>{

let w=watch.find(x=>x.id===t.id)
let price=w?w.price:t.entry

let r=calcR(t,price)

return `
<div class="trade">
<b>${t.symbol} (${t.side})</b><br/>
Entry ${t.entry}<br/>
SL ${t.sl.toFixed(2)}<br/>

R <span class="${r>0?'green':'red'}">${r.toFixed(2)}</span><br/>

<button onclick="del(${i})">🗑</button>
</div>`
}).join("")
}

function del(i){
trades.splice(i,1)
saveLS()
renderTrades()
}

setInterval(updatePrices,5000)
updatePrices()

</script>

</body>
</html>
