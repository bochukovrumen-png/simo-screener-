<!DOCTYPE html>
<html>
<head>
  <title>PRO Trading Screener</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0f19;
      color: white;
    }

    /* LAYOUT */
    .app {
      display: grid;
      grid-template-columns: 260px 1fr 320px;
      height: 100vh;
    }

    /* SIDEBAR */
    .sidebar {
      background: #0f172a;
      padding: 10px;
      overflow-y: auto;
    }

    .coin {
      padding: 10px;
      margin: 5px 0;
      background: #1e293b;
      cursor: pointer;
      border-radius: 6px;
    }

    .coin:hover {
      background: #334155;
    }

    /* MAIN CHART AREA */
    .main {
      padding: 20px;
    }

    .chart {
      height: 500px;
      background: #111827;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: gray;
    }

    /* RIGHT PANEL */
    .right {
      background: #0f172a;
      padding: 10px;
    }

    .stat {
      background: #1e293b;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 8px;
    }

    .buy { color: #22c55e; }
    .sell { color: #ef4444; }

    .header {
      padding: 10px;
      background: #020617;
    }
  </style>
</head>

<body>

<div class="header">
  <b>PRO TradingView Screener (Clone UI)</b>
</div>

<div class="app">

  <!-- LEFT -->
  <div class="sidebar">
    <h3>Watchlist</h3>
    <div id="list"></div>
  </div>

  <!-- CENTER -->
  <div class="main">
    <h3 id="selected">Select Coin</h3>
    <div class="chart">
      📈 Trading Chart Area (next step: real TradingView chart)
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right">
    <h3>Stats</h3>
    <div class="stat">BUY: <span id="buy">0</span></div>
    <div class="stat">SELL: <span id="sell">0</span></div>
    <div class="stat">TOTAL: <span id="total">0</span></div>
  </div>

</div>

<script>
let coins = [];

function getSignal(price) {
  return price % 2 === 0 ? "BUY" : "SELL";
}

function render() {
  const list = document.getElementById("list");

  let buy = 0;
  let sell = 0;

  list.innerHTML = coins.map(c => {
    const signal = getSignal(c.price);

    if (signal === "BUY") buy++;
    if (signal === "SELL") sell++;

    return `
      <div class="coin" onclick="selectCoin('${c.symbol}')">
        <b>${c.symbol}</b><br/>
        $${c.price.toFixed(2)}<br/>
        <span class="${signal === 'BUY' ? 'buy' : 'sell'}">${signal}</span>
      </div>
    `;
  }).join('');

  document.getElementById("buy").innerText = buy;
  document.getElementById("sell").innerText = sell;
  document.getElementById("total").innerText = coins.length;
}

function selectCoin(symbol) {
  document.getElementById("selected").innerText = symbol;
}

async function load() {
  const res = await fetch("/api/refresh");
  const data = await res.json();

  coins = data.coins;
  render();
}

setInterval(load, 5000);
load();
</script>

</body>
</html>
