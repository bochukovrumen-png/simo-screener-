<!DOCTYPE html>
<html>
<head>
<title>Bochu Trading PRO</title>

<style>
body{margin:0;font-family:Arial;background:#0b0f19;color:white}
.top{display:flex;gap:10px;padding:10px;background:#020617}
.btn{padding:6px 12px;background:#1e293b;border-radius:6px;cursor:pointer}
.active{background:#22c55e;color:black}

.app{display:grid;grid-template-columns:260px 1fr 360px;height:95vh}

.sidebar{background:#0f172a;padding:10px}
.coin{background:#1e293b;margin:5px 0;padding:8px;border-radius:6px}

.main{padding:15px}
.right{background:#0f172a;padding:10px}

.trade{background:#111827;margin:5px 0;padding:10px;border-radius:8px}

input{background:#0f172a;color:white;border:1px solid #334155;padding:5px}

.green{color:#22c55e}
.red{color:#ef4444}
.yellow{color:#facc15}
</style>
</head>

<body>

<div class="top">
  <div class="btn active" onclick="setUser('Rumen')">Rumen</div>
  <div class="btn" onclick="setUser('Goro')">Goro</div>

  <input placeholder="Search..." oninput="search(this.value)">
</div>

<div class="app">

<!-- LEFT -->
<div class="sidebar">
  <h3>Watchlist</h3>
  <div id="watch"></div>
</div>

<!-- CENTER -->
<div class="main">

<h3 id="selected">Select asset</h3>

<iframe id="chart" width="100%" height="420"
src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:BTCUSDT&theme=dark"></iframe>

<div>
SL % <input id="sl" value="3">
<button onclick="flip()">Flip</button>
<button onclick="save()">Save</button>
</div>

<div id="analysis"></div>

</div>

<!-- RIGHT -->
<div class="right">
<h3>Trades</h3>
<div id="trades"></div>
</div>

</div>

<script>

let user="Rumen"
let side="LONG"
let temp=null

let store=JSON.parse(localStorage.getItem("store"))||{Rumen:[],Goro:[]}
let watch=JSON.parse(localStorage.getItem("watch"))||[]

function saveStorage(){
localStorage.setItem("store",JSON.stringify(store))
localStorage.setItem("watch",JSON.stringify(watch))
}

function setUser(u){
user=u
renderTrades()
}

function search(q){

let list=["BTC","ETH","SOL","AAPL","TSLA","GOLD","SILVER"]

let res=list.filter(x=>x.toLowerCase().includes(q.toLowerCase()))

document.getElementById("watch").innerHTML=
res.map(s=>`
<div class="coin" onclick="add('${s}')">${s}</div>
`).join("")
}

function add(s){
if(!watch.includes(s)) watch.push(s)
saveStorage()
renderWatch()
}

function remove(i){
watch.splice(i,1)
saveStorage()
renderWatch()
}

function renderWatch(){

document.getElementById("watch").innerHTML=
watch.map((s,i)=>{

let price=100*(1+(Math.random()-0.5)*0.05)

return `
<div class="coin">
<b onclick="select('${s}',${price})">${s}</b>
<br/>$${price.toFixed(2)}
<button onclick="remove(${i})">🗑</button>
</div>`
}).join("")
}

function select(s,p){

document.getElementById("selected").innerText=s

document.getElementById("chart").src=
`https://s.tradingview.com/widgetembed/?symbol=BINANCE:${s}USDT&theme=dark`

temp={symbol:s,entry:p,side}

aiAnalysis()

}

function flip(){
side=side==="LONG"?"SHORT":"LONG"
}

function save(){

let slp=document.getElementById("sl").value

let sl=side==="LONG"?temp.entry*(1-slp/100):temp.entry*(1+slp/100)

store[user].push({...temp,sl})
saveStorage()
renderTrades()
}

function calcR(t,price){

let risk=Math.abs(t.entry-t.sl)
let reward=t.side==="LONG"?price-t.entry:t.entry-price

return reward/risk
}

function renderTrades(){

document.getElementById("trades").innerHTML=
store[user].map((t,i)=>{

let price=t.entry*(1+(Math.random()-0.5)*0.05)

let r=calcR(t,price)

let status="OPEN"
if(t.side==="LONG"&&price<t.sl)status="LOSS"
if(t.side==="SHORT"&&price>t.sl)status="LOSS"

return `
<div class="trade">
<b>${t.symbol} (${t.side})</b><br/>
Entry ${t.entry}<br/>
SL ${t.sl.toFixed(2)}<br/>

R <span class="${r>0?'green':'red'}">${r.toFixed(2)}</span><br/>

${status==="LOSS"?"<span class='red'>LOSS</span>":"<span class='green'>OPEN</span>"}

<button onclick="del(${i})">🗑</button>
</div>`
}).join("")
}

function del(i){
store[user].splice(i,1)
saveStorage()
renderTrades()
}

function aiAnalysis(){

let chance=["HIGH","MEDIUM","LOW"][Math.floor(Math.random()*3)]

let warn=Math.random()>0.6?"⚠️ Weak volume":""
let setup=Math.random()>0.6?"🚀 VCP forming":""

document.getElementById("analysis").innerHTML=
`Chance: ${chance}<br/>${warn}<br/>${setup}`
}

setInterval(()=>{
renderWatch()
renderTrades()
},3000)

renderWatch()
renderTrades()

</script>

</body>
</html>
