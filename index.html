<!DOCTYPE html>
<html>
<head>
  <title>Simo Trading PRO V2</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0f19;
      color: white;
    }

    .app {
      display: grid;
      grid-template-columns: 260px 1fr 360px;
      height: 100vh;
    }

    .sidebar {
      background: #0f172a;
      padding: 10px;
      overflow-y: auto;
    }

    .coin {
      padding: 10px;
      margin: 5px 0;
      background: #1e293b;
      border-radius: 8px;
      cursor: pointer;
    }

    .coin:hover { background: #334155; }

    .main { padding: 15px; }

    .chart {
      height: 420px;
      border-radius: 12px;
      overflow: hidden;
    }

    .right {
      background: #0f172a;
      padding: 10px;
      overflow-y: auto;
    }

    .box {
      background: #111827;
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .trade {
      background: #111827;
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    button {
      margin: 4px;
      padding: 6px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #334155;
      color: white;
    }

    .long { color: #22c55e; }
    .short { color: #ef4444; }

    canvas {
      background: #0f172a;
      width: 100%;
      height: 120px;
    }
  </style>
</head>

<body>

<div class="app">

  <!-- LEFT -->
  <div class="sidebar">
    <h3>Watchlist</h3>
    <div id="list"></div>
  </div>

  <!-- CENTER -->
  <div class="main">

    <h3 id="selected">Select Coin</h3>

    <div class="chart">
      <iframe id="chart"
        width="100%"
        height="420"
        frameborder="0"
        src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:BTCUSDT&theme=dark&interval=5">
      </iframe>
    </div>

    <div class="box">
      <h3>Temp Trade</h3>
      <div id="temp"></div>
      <button onclick="saveTrade()">💾 Save Trade</button>
      <button onclick="toggleSide()">🔄 Toggle LONG/SHORT</button>
    </div>

  </div>

  <!-- RIGHT -->
  <div class="right">

    <div class="box">
      <h3>Equity Curve</h3>
      <canvas id="chartEq"></canvas>
    </div>

    <div class="box">
      <h3>Saved Trades</h3>
      <div id="tradeBox"></div>
    </div>

  </div>

</div>

<script>

let coins = [];
let trades = JSON.parse(localStorage.getItem("trades") || "{}");

let tempTrade = null;
let side = "LONG";
let equity = [100];

function beep() {
  const ctx = new AudioContext();
  const o = ctx.createOscillator();
  o.frequency.value = 600;
  o.connect(ctx.destination);
  o.start();
  setTimeout(() => o.stop(), 100);
}

function selectCoin(symbol, price) {

  document.getElementById("selected").innerText = symbol;

  document.getElementById("chart").src =
    `https://s.tradingview.com/widgetembed/?symbol=BINANCE:${symbol}USDT&theme=dark&interval=5`;

  tempTrade = {
    symbol,
    entry: price,
    sl: side === "LONG" ? price * 0.97 : price * 1.03,
    side
  };

  renderTemp();
}

function toggleSide() {
  side = side === "LONG" ? "SHORT" : "LONG";
  if (tempTrade) {
    tempTrade.side = side;
    tempTrade.sl = side === "LONG"
      ? tempTrade.entry * 0.97
      : tempTrade.entry * 1.03;
  }
  renderTemp();
}

function renderTemp() {
  if (!tempTrade) return;

  const ai = tempTrade.side === "LONG" ? "GOOD setup" : "CHECK risk";

  document.getElementById("temp").innerHTML = `
    Coin: ${tempTrade.symbol}<br/>
    Side: ${tempTrade.side}<br/>
    Entry: ${tempTrade.entry.toFixed(2)}<br/>
    SL: ${tempTrade.sl.toFixed(2)}<br/>
    AI: ${ai}
  `;
}

function saveTrade() {

  if (!tempTrade) return;

  if (!trades[tempTrade.symbol]) trades[tempTrade.symbol] = [];

  if (trades[tempTrade.symbol].length >= 3) {
    alert("Max 3 trades per coin");
    return;
  }

  trades[tempTrade.symbol].push({
    ...tempTrade,
    id: Date.now(),
    status: "OPEN"
  });

  localStorage.setItem("trades", JSON.stringify(trades));
  renderTrades();
}

function deleteTrade(symbol, id) {
  trades[symbol] = trades[symbol].filter(t => t.id !== id);
  localStorage.setItem("trades", JSON.stringify(trades));
  renderTrades();
}

function renderTrades() {

  let html = "";

  for (let s in trades) {
    trades[s].forEach(t => {

      const coin = coins.find(c => c.symbol === s);
      const price = coin ? coin.price : t.entry;

      let pnl;

      if (t.side === "LONG") {
        pnl = (price - t.entry) / (t.entry - t.sl);
      } else {
        pnl = (t.entry - price) / (t.sl - t.entry);
      }

      if ((t.side === "LONG" && price <= t.sl) ||
          (t.side === "SHORT" && price >= t.sl)) {
        t.status = "LOSS";
        beep();
      } else if (pnl > 0) {
        t.status = "PROFIT";
      } else {
        t.status = "OPEN";
      }

      const color =
        t.status === "PROFIT" ? "#22c55e" :
        t.status === "LOSS" ? "#ef4444" : "white";

      html += `
        <div class="trade">
          <b>${s}</b> (${t.side})<br/>
          Entry: ${t.entry.toFixed(2)}<br/>
          SL: ${t.sl.toFixed(2)}<br/>
          PnL (R): <span style="color:${color}">${pnl.toFixed(2)}</span><br/>
          Status: <span style="color:${color}">${t.status}</span><br/>
          <button onclick="deleteTrade('${s}', ${t.id})">🗑</button>
        </div>
      `;
    });
  }

  document.getElementById("tradeBox").innerHTML = html;
}

function updateEquity() {
  let total = 100;

  for (let s in trades) {
    trades[s].forEach(t => {
      total += Math.random() * 2 - 1;
    });
  }

  equity.push(total);
  if (equity.length > 50) equity.shift();

  const c = document.getElementById("chartEq");
  const ctx = c.getContext("2d");

  ctx.clearRect(0,0,400,120);

  ctx.beginPath();
  ctx.moveTo(0, 100);

  equity.forEach((v,i) => {
    ctx.lineTo(i * 8, 120 - v);
  });

  ctx.strokeStyle = "#22c55e";
  ctx.stroke();
}

async function load() {
  const res = await fetch("/api/refresh");
  const data = await res.json();

  coins = data.coins;

  document.getElementById("list").innerHTML = coins.map(c => `
    <div class="coin" onclick="selectCoin('${c.symbol}', ${c.price})">
      <b>${c.symbol}</b><br/>
      $${c.price.toFixed(2)}
    </div>
  `).join('');

  renderTrades();
  updateEquity();
}

setInterval(load, 5000);
load();

</script>

</body>
</html>
