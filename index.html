<!DOCTYPE html>
<html>
<head>
<title>Bochu AI PRO</title>

<style>
body{margin:0;font-family:Arial;background:#0b0f19;color:white}

.top{padding:10px;background:#020617}

button{cursor:pointer;margin:5px;padding:6px;border:none;border-radius:6px;background:#334155;color:white}
.active{background:#22c55e;color:black}

.app{display:grid;grid-template-columns:260px 1fr 360px;height:95vh}

.sidebar{background:#0f172a;padding:10px;overflow:auto}
.coin{background:#1e293b;margin:5px 0;padding:8px;border-radius:6px;cursor:pointer}

.main{padding:15px}
.right{background:#0f172a;padding:10px;overflow:auto}

.trade{background:#111827;margin:5px 0;padding:10px;border-radius:8px}

.green{color:#22c55e}
.red{color:#ef4444}
.yellow{color:#facc15}
</style>
</head>

<body>

<div class="top">
<input placeholder="Search..." oninput="search(this.value)">
<div id="results"></div>
</div>

<div class="app">

<!-- LEFT -->
<div class="sidebar">
<h3>Watchlist</h3>
<div id="watch"></div>
</div>

<!-- CENTER -->
<div class="main">

<h3 id="asset">Select asset</h3>

<iframe id="chart" width="100%" height="420"
src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:BTCUSDT&theme=dark"></iframe>

<div id="analysis"></div>

<div>
<button id="longBtn" onclick="setSide('LONG')">LONG</button>
<button id="shortBtn" onclick="setSide('SHORT')">SHORT</button>
</div>

SL % <input id="sl" value="3">

<button onclick="startTrade()">🚀 Start Trade</button>

<h3>AI Top Setups</h3>
<div id="top"></div>

<div id="aiDetails"></div>

</div>

<!-- RIGHT -->
<div class="right">
<h3>Trades</h3>
<div id="trades"></div>
</div>

</div>

<script>

let trades=JSON.parse(localStorage.getItem("trades"))||[]
let watch=JSON.parse(localStorage.getItem("watch"))||[]

let current=null
let side="LONG"
let aiMap={}

function saveLS(){
localStorage.setItem("trades",JSON.stringify(trades))
localStorage.setItem("watch",JSON.stringify(watch))
}

// UI FIX
function setSide(s){
side=s
document.getElementById("longBtn").classList.toggle("active",s==="LONG")
document.getElementById("shortBtn").classList.toggle("active",s==="SHORT")
}

// SEARCH
async function search(q){
if(q.length<2){results.innerHTML="";return}

let res=await fetch(`https://api.coingecko.com/api/v3/search?query=${q}`)
let data=await res.json()

results.innerHTML=data.coins.slice(0,6).map(c=>`
<div onclick="select('${c.id}','${c.symbol.toUpperCase()}')" style="cursor:pointer">
${c.symbol.toUpperCase()} - ${c.name}
</div>`).join("")
}

// SELECT
function select(id,symbol){
results.innerHTML=""

if(!watch.find(x=>x.id===id)){
watch.push({id,symbol,price:0})
saveLS()
}

current={id,symbol}

asset.innerText=symbol

chart.src=`https://s.tradingview.com/widgetembed/?symbol=BINANCE:${symbol}USDT&theme=dark`

}

// PRICE UPDATE
async function updatePrices(){
if(watch.length===0)return

let ids=watch.map(x=>x.id).join(",")

let res=await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd`)
let data=await res.json()

watch.forEach(w=>{
if(data[w.id]) w.price=data[w.id].usd
})

renderWatch()
renderTrades()
scanAI()
}

// WATCH
function renderWatch(){
watchEl.innerHTML=watch.map((w,i)=>`
<div class="coin">
<b onclick="select('${w.id}','${w.symbol}')">${w.symbol}</b><br/>
$${w.price}
<button onclick="remove(${i})">🗑</button>
</div>`).join("")
}

function remove(i){
watch.splice(i,1)
saveLS()
renderWatch()
}

// TRADE
function startTrade(){

if(!current)return alert("Select asset")

let w=watch.find(x=>x.id===current.id)
if(!w||!w.price)return alert("Wait price")

let entry=w.price
let slp=sl.value

let sl=side==="LONG"?entry*(1-slp/100):entry*(1+slp/100)

trades.push({
id:Date.now(),
symbol:current.symbol,
side,
entry,
sl
})

saveLS()
renderTrades()
}

// R
function calcR(t,price){
let risk=Math.abs(t.entry-t.sl)
let reward=t.side==="LONG"?price-t.entry:t.entry-price
return reward/risk
}

function renderTrades(){
tradesEl.innerHTML=trades.map((t,i)=>{
let w=watch.find(x=>x.symbol===t.symbol)
let price=w?w.price:t.entry
let r=calcR(t,price)

let status="OPEN"
if(t.side==="LONG"&&price<t.sl)status="LOSS"
if(t.side==="SHORT"&&price>t.sl)status="LOSS"

return `
<div class="trade">
<b>${t.symbol} (${t.side})</b><br/>
Entry ${t.entry}<br/>
SL ${t.sl.toFixed(2)}<br/>
R <span class="${r>0?'green':'red'}">${r.toFixed(2)}</span><br/>
<span class="${status==='LOSS'?'red':'green'}">${status}</span><br/>
<button onclick="del(${i})">🗑</button>
</div>`
}).join("")
}

function del(i){
trades.splice(i,1)
saveLS()
renderTrades()
}

// AI SCAN
function scanAI(){

let list=[]

watch.forEach(w=>{

if(!w.price)return

let score=0
let trend=Math.random()
let vcp=Math.random()

if(trend>0.6) score+=40
if(vcp>0.6) score+=30
if(w.price%2===0) score+=30

list.push({
symbol:w.symbol,
score,
side:trend>0.5?"LONG":"SHORT",
note: trend>0.6?"Trend OK":"Weak trend"
})

})

list.sort((a,b)=>b.score-a.score)

let top10=list.slice(0,10)

top.innerHTML=top10.map(t=>`
<div onclick="showAI('${t.symbol}')"
style="cursor:pointer">

<b>${t.symbol}</b> (${t.side})<br/>
Score: ${t.score}
</div>`).join("")

aiMap=Object.fromEntries(top10.map(t=>[t.symbol,t]))
}

// AI DETAILS
function showAI(sym){

let t=aiMap[sym]

aiDetails.innerHTML=`
<b>${sym}</b><br/>
Score: ${t.score}<br/>

${t.score>70?"✅ EMA + VCP OK":"⚠️ Missing structure"}<br/>
${t.note}
`
}

setInterval(updatePrices,4000)
updatePrices()

</script>

</body>
</html>
