<!DOCTYPE html>
<html>
<head>
  <title>Trading Journal PRO</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0f19;
      color: white;
    }

    .top {
      display: flex;
      gap: 10px;
      padding: 10px;
      background: #020617;
    }

    .user {
      padding: 8px 15px;
      background: #1e293b;
      border-radius: 8px;
      cursor: pointer;
    }

    .active {
      background: #22c55e;
      color: black;
    }

    .app {
      display: grid;
      grid-template-columns: 260px 1fr 360px;
      height: 95vh;
    }

    .sidebar {
      background: #0f172a;
      padding: 10px;
      overflow-y: auto;
    }

    .coin {
      padding: 10px;
      margin: 5px 0;
      background: #1e293b;
      border-radius: 8px;
      cursor: pointer;
    }

    .main {
      padding: 15px;
    }

    .right {
      background: #0f172a;
      padding: 10px;
      overflow-y: auto;
    }

    .box {
      background: #111827;
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .trade {
      background: #111827;
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    button {
      margin-top: 5px;
      padding: 6px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      background: #334155;
      color: white;
    }

    .long { color: #22c55e; }
    .short { color: #ef4444; }

    .ai-good { color: #22c55e; }
    .ai-bad { color: #ef4444; }
  </style>
</head>

<body>

<div class="top">
  <div class="user active" onclick="switchUser('Rumen')">Rumen</div>
  <div class="user" onclick="switchUser('Goro')">Goro</div>
</div>

<div class="app">

  <!-- LEFT -->
  <div class="sidebar">
    <h3>Assets</h3>
    <div id="list"></div>
  </div>

  <!-- CENTER -->
  <div class="main">
    <h2 id="title">Rumen</h2>

    <h3 id="selected">Select asset</h3>

    <iframe id="chart"
      width="100%"
      height="420"
      frameborder="0"
      src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:BTCUSDT&theme=dark&interval=5">
    </iframe>

    <div class="box">
      <h3>Current Trade</h3>
      <div id="temp"></div>

      <button onclick="flip()">🔄 Flip LONG/SHORT</button>
      <button onclick="saveTrade()">💾 Save Trade</button>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right">

    <div class="box">
      <h3>AI Signal</h3>
      <div id="ai"></div>
    </div>

    <h3>Trades</h3>
    <div id="trades"></div>

  </div>

</div>

<script>

let currentUser = "Rumen";

let store = {
  Rumen: [],
  Goro: []
};

let assets = [];
let temp = null;
let side = "LONG";

function switchUser(u) {
  currentUser = u;

  document.querySelectorAll(".user").forEach(e => e.classList.remove("active"));
  event.target.classList.add("active");

  document.getElementById("title").innerText = u;

  renderTrades();
}

function ema(arr, p) {
  const k = 2 / (p + 1);
  let v = arr[0];
  for (let i = 1; i < arr.length; i++) {
    v = arr[i] * k + v * (1 - k);
  }
  return v;
}

function aiCheck(prices) {

  const e9 = ema(prices, 9);
  const e20 = ema(prices, 20);
  const e50 = ema(prices, 50);
  const e200 = ema(prices, 50);

  const range = Math.max(...prices) - Math.min(...prices);
  const consolidation = range < prices[0] * 0.03;

  if (e9 > e20 && e20 > e50 && e50 > e200 && consolidation)
    return {text:"GOOD LONG", ok:true};

  if (e200 > e50 && e50 > e20 && e20 > e9 && consolidation)
    return {text:"GOOD SHORT", ok:true};

  return {text:"NO SETUP", ok:false};
}

function select(symbol, price) {

  document.getElementById("selected").innerText = symbol;

  document.getElementById("chart").src =
    `https://s.tradingview.com/widgetembed/?symbol=BINANCE:${symbol}USDT&theme=dark&interval=5`;

  const prices = Array.from({length: 60}, () =>
    price * (1 + (Math.random() - 0.5) * 0.05)
  );

  const ai = aiCheck(prices);

  temp = {
    symbol,
    entry: price,
    sl: side === "LONG" ? price * 0.97 : price * 1.03,
    side
  };

  document.getElementById("ai").innerHTML =
    `<span class="${ai.ok ? 'ai-good' : 'ai-bad'}">${ai.text}</span>`;

  document.getElementById("temp").innerHTML =
    `${symbol}<br/>Entry: ${price}<br/>Side: ${side}`;
}

function flip() {
  side = side === "LONG" ? "SHORT" : "LONG";
  if (temp) {
    temp.side = side;
    temp.sl = side === "LONG" ? temp.entry * 0.97 : temp.entry * 1.03;
  }
  document.getElementById("temp").innerHTML =
    `${temp.symbol}<br/>Entry: ${temp.entry}<br/>Side: ${side}`;
}

function saveTrade() {

  if (!store[currentUser]) store[currentUser] = [];

  if (store[currentUser].length >= 50) {
    alert("Max 50 trades");
    return;
  }

  store[currentUser].push({
    ...temp,
    id: Date.now(),
    status: "OPEN"
  });

  renderTrades();
}

function del(id) {
  store[currentUser] =
    store[currentUser].filter(t => t.id !== id);

  renderTrades();
}

function renderTrades() {

  const box = document.getElementById("trades");

  box.innerHTML = (store[currentUser] || []).map(t => {

    const color = t.side === "LONG" ? "#22c55e" : "#ef4444";

    return `
      <div class="trade">
        <b style="color:${color}">${t.symbol} (${t.side})</b><br/>
        Entry: ${t.entry}<br/>
        SL: ${t.sl}<br/>
        <button onclick="del(${t.id})">🗑</button>
      </div>
    `;
  }).join('');
}

async function load() {
  const res = await fetch("/api/refresh");
  const data = await res.json();

  assets = data.coins;

  document.getElementById("list").innerHTML =
    assets.map(a => `
      <div class="coin" onclick="select('${a.symbol}', ${a.price})">
        ${a.symbol}<br/>${a.price}
      </div>
    `).join('');
}

setInterval(load, 5000);
load();

</script>

</body>
</html>
