<!DOCTYPE html>
<html>
<head>
  <title>Simo Screener PRO</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
    }

    header {
      padding: 20px;
      background: #020617;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    h1 {
      margin: 0;
      font-size: 20px;
    }

    .stats {
      display: flex;
      gap: 20px;
    }

    .stat {
      background: #1e293b;
      padding: 10px 15px;
      border-radius: 8px;
    }

    .controls {
      padding: 15px;
    }

    button {
      margin-right: 10px;
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    .buy { background: #16a34a; color: white; }
    .sell { background: #dc2626; color: white; }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 10px;
      text-align: left;
    }

    tr:nth-child(even) {
      background: #1e293b;
    }

    .chart {
      height: 40px;
    }

    .container {
      padding: 20px;
    }
  </style>
</head>

<body>

<header>
  <h1>Simo Screener PRO</h1>

  <div class="stats">
    <div class="stat">BUY: <span id="buyCount">0</span></div>
    <div class="stat">SELL: <span id="sellCount">0</span></div>
  </div>
</header>

<div class="controls">
  <button onclick="setFilter('ALL')">ALL</button>
  <button class="buy" onclick="setFilter('BUY')">BUY</button>
  <button class="sell" onclick="setFilter('SELL')">SELL</button>
</div>

<div class="container">
  <table>
    <thead>
      <tr>
        <th>Coin</th>
        <th>Price</th>
        <th>Signal</th>
        <th>Chart</th>
      </tr>
    </thead>
    <tbody id="table"></tbody>
  </table>
</div>

<script>
let history = {};
let filter = "ALL";

function setFilter(f) {
  filter = f;
}

function ema(prices, period) {
  const k = 2 / (period + 1);
  let val = prices[0];

  for (let i = 1; i < prices.length; i++) {
    val = prices[i] * k + val * (1 - k);
  }

  return val;
}

function getSignal(symbol, price) {
  if (!history[symbol]) history[symbol] = [];

  history[symbol].push(price);

  if (history[symbol].length > 30) history[symbol].shift();

  if (history[symbol].length < 21) return "WAIT";

  const e9 = ema(history[symbol].slice(-9), 9);
  const e21 = ema(history[symbol].slice(-21), 21);

  if (e9 > e21) return "BUY";
  if (e9 < e21) return "SELL";
  return "WAIT";
}

function sparkline(prices) {
  const max = Math.max(...prices);
  const min = Math.min(...prices);

  return prices.map(p => {
    const h = ((p - min) / (max - min)) * 40;
    return `<div style="width:2px;height:${h}px;background:#3b82f6;display:inline-block"></div>`;
  }).join('');
}

async function refreshData() {
  const res = await fetch('/api/refresh');
  const data = await res.json();

  let buy = 0;
  let sell = 0;

  const rows = data.coins.map(c => {
    const signal = getSignal(c.symbol, c.price);

    if (signal === "BUY") buy++;
    if (signal === "SELL") sell++;

    if (filter !== "ALL" && signal !== filter) return "";

    const prices = history[c.symbol] || [];

    return `
      <tr>
        <td>${c.symbol}</td>
        <td>${c.price.toFixed(2)}</td>
        <td style="color:${signal === 'BUY' ? '#22c55e' : signal === 'SELL' ? '#ef4444' : 'gray'}">
          ${signal}
        </td>
        <td class="chart">${sparkline(prices)}</td>
      </tr>
    `;
  }).join('');

  document.getElementById('table').innerHTML = rows;
  document.getElementById('buyCount').innerText = buy;
  document.getElementById('sellCount').innerText = sell;
}

setInterval(refreshData, 5000);
</script>

</body>
</html>
