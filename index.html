<!DOCTYPE html>
<html>
<head>
  <title>AI Trading Journal</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0f19;
      color: white;
    }

    .topbar {
      display: flex;
      gap: 10px;
      padding: 10px;
      background: #020617;
    }

    .user {
      padding: 8px 15px;
      background: #1e293b;
      border-radius: 8px;
      cursor: pointer;
    }

    .active {
      background: #22c55e;
      color: black;
    }

    .app {
      display: grid;
      grid-template-columns: 260px 1fr 360px;
      height: 95vh;
    }

    .sidebar {
      background: #0f172a;
      padding: 10px;
      overflow-y: auto;
    }

    .coin {
      padding: 10px;
      margin: 5px 0;
      background: #1e293b;
      border-radius: 8px;
      cursor: pointer;
    }

    .main {
      padding: 15px;
    }

    .right {
      background: #0f172a;
      padding: 10px;
      overflow-y: auto;
    }

    .trade {
      background: #111827;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 10px;
    }

    .good { color: #22c55e; }
    .bad { color: #ef4444; }
    .ok { color: #facc15; }

  </style>
</head>

<body>

<!-- USERS -->
<div class="topbar">
  <div class="user active" onclick="switchUser('Rumbe')">Rumbe</div>
  <div class="user" onclick="switchUser('Goro')">Goro</div>
</div>

<div class="app">

  <!-- LEFT -->
  <div class="sidebar">
    <h3>Watchlist</h3>
    <div id="list"></div>
  </div>

  <!-- CENTER -->
  <div class="main">
    <h2 id="title">User: Rumbe</h2>
    <h3 id="selected">Select Coin</h3>

    <iframe id="chart"
      width="100%"
      height="420"
      frameborder="0"
      src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:BTCUSDT&theme=dark&interval=5">
    </iframe>
  </div>

  <!-- RIGHT -->
  <div class="right">
    <h3>AI Trade Signal</h3>
    <div id="ai"></div>

    <h3>Trades</h3>
    <div id="tradeBox"></div>
  </div>

</div>

<script>

let currentUser = "Rumbe";
let dataStore = {
  Rumbe: [],
  Goro: []
};

let coins = [];

function switchUser(u) {
  currentUser = u;

  document.querySelectorAll(".user").forEach(el => el.classList.remove("active"));
  event.target.classList.add("active");

  document.getElementById("title").innerText = "User: " + u;

  renderTrades();
}

function ema(arr, period) {
  const k = 2 / (period + 1);
  let val = arr[0];
  for (let i = 1; i < arr.length; i++) {
    val = arr[i] * k + val * (1 - k);
  }
  return val;
}

function analyzeAI(prices) {

  if (prices.length < 50) return "NOT ENOUGH DATA";

  const last = prices.slice(-50);

  const e9 = ema(last.slice(-9), 9);
  const e20 = ema(last.slice(-20), 20);
  const e50 = ema(last.slice(-50), 50);
  const e200 = ema(last, 50); // simplified demo

  const range = Math.max(...last) - Math.min(...last);

  const consolidation = range < last[last.length - 1] * 0.03;

  // LONG setup
  if (e9 > e20 && e20 > e50 && e50 > e200 && consolidation) {
    return { verdict: "GOOD LONG", type: "good" };
  }

  // SHORT setup
  if (e200 > e50 && e50 > e20 && e20 > e9 && consolidation) {
    return { verdict: "GOOD SHORT", type: "good" };
  }

  if (consolidation) {
    return { verdict: "WAIT BREAKOUT", type: "ok" };
  }

  return { verdict: "AVOID TRADE", type: "bad" };
}

function selectCoin(symbol, price) {

  document.getElementById("selected").innerText = symbol;

  document.getElementById("chart").src =
    `https://s.tradingview.com/widgetembed/?symbol=BINANCE:${symbol}USDT&theme=dark&interval=5`;

  let userTrades = dataStore[currentUser];

  let prices = Array.from({length: 60}, () => price * (1 + (Math.random() - 0.5) * 0.05));

  let ai = analyzeAI(prices);

  document.getElementById("ai").innerHTML = `
    <b class="${ai.type}">${ai.verdict}</b>
  `;

  if (userTrades.length < 50) {
    userTrades.push({
      symbol,
      entry: price,
      ai: ai.verdict
    });
  }

  renderTrades();
}

function renderTrades() {

  let box = document.getElementById("tradeBox");
  let trades = dataStore[currentUser];

  box.innerHTML = trades.map(t => `
    <div class="trade">
      <b>${t.symbol}</b><br/>
      Entry: ${t.entry}<br/>
      AI: <span class="${
        t.ai.includes("GOOD") ? "good" :
        t.ai.includes("WAIT") ? "ok" : "bad"
      }">${t.ai}</span>
    </div>
  `).join('');
}

async function load() {
  const res = await fetch("/api/refresh");
  const data = await res.json();

  coins = data.coins;

  document.getElementById("list").innerHTML = coins.map(c => `
    <div class="coin" onclick="selectCoin('${c.symbol}', ${c.price})">
      <b>${c.symbol}</b><br/>
      $${c.price.toFixed(2)}
    </div>
  `).join('');
}

setInterval(load, 5000);
load();

</script>

</body>
</html>
