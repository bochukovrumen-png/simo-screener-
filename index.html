<!DOCTYPE html>
<html>
<head>
  <title>PRO Trading Journal AI</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0f19;
      color: white;
    }

    .top {
      display: flex;
      gap: 10px;
      padding: 10px;
      background: #020617;
    }

    .btn {
      padding: 6px 12px;
      background: #1e293b;
      border-radius: 6px;
      cursor: pointer;
    }

    .active {
      background: #22c55e;
      color: black;
    }

    .app {
      display: grid;
      grid-template-columns: 260px 1fr 360px;
      height: 95vh;
    }

    .sidebar {
      background: #0f172a;
      padding: 10px;
      overflow-y: auto;
    }

    .coin {
      padding: 10px;
      margin: 5px 0;
      background: #1e293b;
      border-radius: 8px;
      cursor: pointer;
    }

    .main {
      padding: 15px;
    }

    .right {
      background: #0f172a;
      padding: 10px;
      overflow-y: auto;
    }

    .box {
      background: #111827;
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .trade {
      background: #111827;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 10px;
    }

    .green { color: #22c55e; }
    .red { color: #ef4444; }

    input {
      width: 50px;
      background: #0f172a;
      color: white;
      border: 1px solid #334155;
      text-align: center;
    }
  </style>
</head>

<body>

<!-- USERS -->
<div class="top">
  <div class="btn active" onclick="setUser('Rumen')">Rumen</div>
  <div class="btn" onclick="setUser('Goro')">Goro</div>

  <div class="btn" onclick="setCat('crypto')">Crypto</div>
  <div class="btn" onclick="setCat('stocks')">Stocks</div>
  <div class="btn" onclick="setCat('assets')">Assets</div>
</div>

<div class="app">

  <!-- LEFT -->
  <div class="sidebar">
    <h3>Assets</h3>
    <div id="list"></div>
  </div>

  <!-- CENTER -->
  <div class="main">

    <h3 id="selected">Select asset</h3>

    <iframe id="chart"
      width="100%"
      height="420"
      frameborder="0"
      src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:BTCUSDT&theme=dark&interval=5">
    </iframe>

    <div class="box">
      <h3>Trade Setup</h3>

      <div id="temp"></div>

      SL %:
      <input id="slInput" value="3" />

      <button onclick="flip()">🔄 Flip LONG/SHORT</button>
      <button onclick="save()">💾 Save</button>
    </div>

  </div>

  <!-- RIGHT -->
  <div class="right">

    <div class="box">
      <h3>Trades</h3>
      <div id="trades"></div>
    </div>

  </div>

</div>

<script>

let user = "Rumen";
let cat = "crypto";

let store = {
  Rumen: [],
  Goro: []
};

let assets = [];
let temp = null;
let side = "LONG";

function setUser(u){
  user = u;
  document.querySelectorAll(".btn").forEach(b=>b.classList.remove("active"));
  event.target.classList.add("active");
  render();
}

function setCat(c){
  cat = c;
  render();
}

function slPrice(price, percent, side){

  percent = parseFloat(percent);

  if(side === "LONG"){
    return price * (1 - percent/100);
  } else {
    return price * (1 + percent/100);
  }
}

function rr(entry, sl, current, side){

  let risk = Math.abs(entry - sl);
  let reward;

  if(side === "LONG"){
    reward = current - entry;
  } else {
    reward = entry - current;
  }

  return reward / risk;
}

function select(symbol, price){

  document.getElementById("selected").innerText = symbol;

  document.getElementById("chart").src =
    `https://s.tradingview.com/widgetembed/?symbol=BINANCE:${symbol}USDT&theme=dark&interval=5`;

  let slp = document.getElementById("slInput").value;

  temp = {
    symbol,
    entry: price,
    side,
    slPercent: slp
  };

  document.getElementById("temp").innerHTML =
    `${symbol}<br/>Entry: ${price}<br/>Side: ${side}`;
}

function flip(){
  side = side === "LONG" ? "SHORT" : "LONG";
}

function save(){
  store[user].push(temp);
  renderTrades();
}

function del(i){
  store[user].splice(i,1);
  renderTrades();
}

function renderTrades(){

  document.getElementById("trades").innerHTML =
  store[user].map((t,i)=>{

    let sl = slPrice(t.entry, t.slPercent, t.side);

    let current = t.entry * (1 + (Math.random()-0.5)*0.05);

    let pnl = rr(t.entry, sl, current, t.side);

    let status = "OPEN";

    if(t.side==="LONG" && current < sl) status="LOSS";
    if(t.side==="SHORT" && current > sl) status="LOSS";

    return `
      <div class="trade">
        <b>${t.symbol} (${t.side})</b><br/>
        Entry: ${t.entry}<br/>
        SL: ${sl.toFixed(2)}<br/>

        R: <span class="${pnl>0?'green':'red'}">${pnl.toFixed(2)}</span><br/>

        Status: <span class="${status==='LOSS'?'red':'green'}">${status}</span><br/>

        <button onclick="del(${i})">🗑</button>
      </div>
    `;
  }).join('');
}

function render(){

  let list = document.getElementById("list");

  let data = [];

  if(cat === "crypto"){
    data = ["BTC","ETH","SOL","XRP","DOGE","ADA","AVAX"];
  }

  if(cat === "stocks"){
    data = ["AAPL","TSLA","NVDA","META","AMZN","MSFT"];
  }

  if(cat === "assets"){
    data = ["GOLD","SILVER","OIL","SP500","DXY","EURUSD"];
  }

  list.innerHTML = data.map(s=>`
    <div class="coin" onclick="select('${s}', 100)">
      ${s}
    </div>
  `).join('');

  renderTrades();
}

render();

</script>

</body>
</html>
