<!DOCTYPE html>
<html>
<head>
  <title>Simo Trading PRO</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0f19;
      color: white;
    }

    .app {
      display: grid;
      grid-template-columns: 260px 1fr 360px;
      height: 100vh;
    }

    /* LEFT */
    .sidebar {
      background: #0f172a;
      padding: 10px;
      overflow-y: auto;
    }

    .coin {
      padding: 10px;
      margin: 5px 0;
      background: #1e293b;
      border-radius: 8px;
      cursor: pointer;
    }

    .coin:hover {
      background: #334155;
    }

    /* CENTER */
    .main {
      padding: 15px;
    }

    .chart {
      border-radius: 12px;
      overflow: hidden;
      height: 520px;
    }

    /* RIGHT PANEL */
    .right {
      background: #0f172a;
      padding: 10px;
      overflow-y: auto;
    }

    .box {
      background: #111827;
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    td {
      padding: 6px;
      border-bottom: 1px solid #1f2937;
    }

    .green {
      color: #22c55e;
      font-weight: bold;
    }

    .red {
      color: #ef4444;
    }

    .header {
      padding: 10px;
      background: #020617;
    }
  </style>
</head>

<body>

<div class="header">
  <b>Simo Trading PRO</b>
</div>

<div class="app">

  <!-- LEFT -->
  <div class="sidebar">
    <h3>Watchlist</h3>
    <div id="list"></div>
  </div>

  <!-- CENTER -->
  <div class="main">
    <h3 id="selected">Select Coin</h3>

    <div class="chart">
      <iframe id="chart"
        width="100%"
        height="520"
        frameborder="0"
        src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:BTCUSDT&theme=dark&interval=5">
      </iframe>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right">

    <div class="box">
      <h3>Trade Journal</h3>

      <table>
        <tr><td>Coin</td><td id="tcoin">-</td></tr>
        <tr><td>Entry</td><td id="entry">-</td></tr>
        <tr><td>Stop Loss (-3%)</td><td id="sl">-</td></tr>
        <tr>
          <td>Profit (R)</td>
          <td id="profit" class="green">-</td>
        </tr>
      </table>
    </div>

  </div>

</div>

<script>

let coins = [];

function calculateTrade(price) {
  const entry = price;
  const sl = price * 0.97;

  // fake move simulation (demo logic)
  const current = price * (1 + (Math.random() * 0.06 - 0.02));

  const risk = entry - sl;
  const reward = current - entry;

  const r = reward / risk;

  return {
    entry,
    sl,
    r
  };
}

function render() {
  const list = document.getElementById("list");

  list.innerHTML = coins.map(c => `
    <div class="coin" onclick="selectCoin('${c.symbol}', ${c.price})">
      <b>${c.symbol}</b><br/>
      $${c.price.toFixed(2)}
    </div>
  `).join('');
}

function selectCoin(symbol, price) {

  // 1. update chart
  document.getElementById("selected").innerText = symbol;

  document.getElementById("chart").src =
    `https://s.tradingview.com/widgetembed/?symbol=BINANCE:${symbol}USDT&theme=dark&interval=5`;

  // 2. trade logic
  const trade = calculateTrade(price);

  document.getElementById("tcoin").innerText = symbol;
  document.getElementById("entry").innerText = trade.entry.toFixed(2);
  document.getElementById("sl").innerText = trade.sl.toFixed(2);
  document.getElementById("profit").innerText = trade.r.toFixed(2);
}

async function load() {
  const res = await fetch("/api/refresh");
  const data = await res.json();
  coins = data.coins;
  render();
}

setInterval(load, 5000);
load();

</script>

</body>
</html>
