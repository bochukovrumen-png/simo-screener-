<!DOCTYPE html>
<html>
<head>
  <title>Trading Journal PRO AI</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0f19;
      color: white;
    }

    .top {
      display: flex;
      gap: 10px;
      padding: 10px;
      background: #020617;
    }

    .user {
      padding: 8px 15px;
      background: #1e293b;
      border-radius: 8px;
      cursor: pointer;
    }

    .active {
      background: #22c55e;
      color: black;
    }

    .app {
      display: grid;
      grid-template-columns: 260px 1fr 360px;
      height: 95vh;
    }

    .sidebar {
      background: #0f172a;
      padding: 10px;
      overflow-y: auto;
    }

    .coin {
      padding: 10px;
      margin: 5px 0;
      background: #1e293b;
      border-radius: 8px;
      cursor: pointer;
    }

    .main {
      padding: 15px;
    }

    .right {
      background: #0f172a;
      padding: 10px;
      overflow-y: auto;
    }

    .box {
      background: #111827;
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .trade {
      background: #111827;
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    button {
      margin-top: 5px;
      padding: 6px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      background: #334155;
      color: white;
    }

    .long { color: #22c55e; }
    .short { color: #ef4444; }

    .good { color: #22c55e; }
    .bad { color: #ef4444; }
    .mid { color: #facc15; }
  </style>
</head>

<body>

<div class="top">
  <div class="user active" onclick="switchUser('Rumen')">Rumen</div>
  <div class="user" onclick="switchUser('Goro')">Goro</div>
</div>

<div class="app">

  <!-- LEFT -->
  <div class="sidebar">
    <h3>Assets</h3>
    <div id="list"></div>
  </div>

  <!-- CENTER -->
  <div class="main">

    <h2 id="title">Rumen</h2>

    <h3 id="selected">Select asset</h3>

    <iframe id="chart"
      width="100%"
      height="420"
      frameborder="0"
      src="https://s.tradingview.com/widgetembed/?symbol=BINANCE:BTCUSDT&theme=dark&interval=5">
    </iframe>

    <div class="box">
      <h3>Current Trade</h3>
      <div id="temp"></div>

      <button onclick="flip()">🔄 Flip LONG/SHORT</button>
      <button onclick="saveTrade()">💾 Save Trade</button>
    </div>

  </div>

  <!-- RIGHT -->
  <div class="right">

    <div class="box">
      <h3>📊 Winrate</h3>
      <div id="winrate">0%</div>
    </div>

    <div class="box">
      <h3>AI Score</h3>
      <div id="ai"></div>
    </div>

    <h3>Trades</h3>
    <div id="trades"></div>

  </div>

</div>

<script>

let currentUser = "Rumen";

let store = {
  Rumen: [],
  Goro: []
};

let assets = [];
let temp = null;
let side = "LONG";

// ---------------- USERS ----------------
function switchUser(u){
  currentUser = u;
  document.querySelectorAll(".user").forEach(x=>x.classList.remove("active"));
  event.target.classList.add("active");
  document.getElementById("title").innerText = u;
  renderTrades();
  calcWinrate();
}

// ---------------- AI SCORE ----------------
function aiScore(side, entry, current, sl){

  let risk = Math.abs(entry - sl);
  let reward = side === "LONG" ? current - entry : entry - current;

  let r = reward / risk;

  let score = 50;

  if (r > 2) score = 90;
  else if (r > 1) score = 75;
  else if (r > 0) score = 60;
  else if (r > -1) score = 40;
  else score = 20;

  return score;
}

// ---------------- SL ----------------
function calcSL(entry){
  return side === "LONG" ? entry * 0.97 : entry * 1.03;
}

// ---------------- SELECT ----------------
function select(symbol, price){

  document.getElementById("selected").innerText = symbol;

  document.getElementById("chart").src =
    `https://s.tradingview.com/widgetembed/?symbol=BINANCE:${symbol}USDT&theme=dark&interval=5`;

  temp = {
    symbol,
    entry: price,
    side,
    sl: calcSL(price)
  };

  document.getElementById("temp").innerHTML =
    `${symbol}<br/>Entry: ${price}<br/>Side: ${side}`;
}

// ---------------- FLIP ----------------
function flip(){
  side = side === "LONG" ? "SHORT" : "LONG";
  if(temp){
    temp.side = side;
    temp.sl = calcSL(temp.entry);
  }
}

// ---------------- SAVE ----------------
function saveTrade(){

  store[currentUser].push({
    ...temp,
    id: Date.now()
  });

  renderTrades();
  calcWinrate();
}

// ---------------- DELETE ----------------
function del(id){
  store[currentUser] = store[currentUser].filter(t=>t.id!==id);
  renderTrades();
  calcWinrate();
}

// ---------------- WINRATE ----------------
function calcWinrate(){

  let trades = store[currentUser];

  if(trades.length === 0){
    document.getElementById("winrate").innerText = "0%";
    return;
  }

  let wins = 0;

  trades.forEach(t=>{
    let current = t.entry * (1 + (Math.random()-0.5)*0.06);

    if(t.side === "LONG" && current > t.entry) wins++;
    if(t.side === "SHORT" && current < t.entry) wins++;
  });

  let wr = (wins / trades.length) * 100;

  document.getElementById("winrate").innerText =
    wr.toFixed(1) + "%";
}

// ---------------- RENDER ----------------
function renderTrades(){

  document.getElementById("trades").innerHTML =
  (store[currentUser] || []).map(t=>{

    let current = t.entry * (1 + (Math.random()-0.5)*0.06);

    let r = (t.side==="LONG"
      ? (current - t.entry)
      : (t.entry - current)) / Math.abs(t.entry - t.sl);

    let score = aiScore(t.side, t.entry, current, t.sl);

    let status = "OPEN";

    if(t.side==="LONG" && current < t.sl) status="LOSS";
    if(t.side==="SHORT" && current > t.sl) status="LOSS";

    return `
      <div class="trade">
        <b>${t.symbol} (${t.side})</b><br/>

        Entry: ${t.entry}<br/>
        SL: ${t.sl.toFixed(2)}<br/>

        R: <span class="${r>=0?'good':'bad'}">${r.toFixed(2)}</span><br/>

        AI Score:
        <span class="${
          score>70?'good':
          score>40?'mid':'bad'
        }">${score}/100</span><br/>

        Status:
        <span class="${status==='LOSS'?'bad':'good'}">${status}</span><br/>

        <button onclick="del(${t.id})">🗑</button>
      </div>
    `;
  }).join('');
}

// ---------------- ASSETS ----------------
async function load(){

  const res = await fetch("/api/refresh");
  const data = await res.json();

  assets = data.coins;

  document.getElementById("list").innerHTML =
  assets.map(a=>`
    <div class="coin" onclick="select('${a.symbol}',${a.price})">
      ${a.symbol}
    </div>
  `).join('');
}

setInterval(load,5000);
load();

</script>

</body>
</html>
